name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  build:
    name: Build UVieKey
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Fetch uvie-rs library
        run: ./scripts/fetch-uvie.sh

      - name: Generate version info
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" Info.plist)
          COMMIT=$(git rev-parse --short HEAD)
          mkdir -p Sources/UVieKey/Generated
          cat > Sources/UVieKey/Generated/Version.swift <<EOF
          // Auto-generated by CI workflow. Do not edit manually.
          enum AppVersion {
              static let version = "$VERSION"
              static let commitHash = "$COMMIT"
              static let fullVersion = "v\(version)-\(commitHash)"
          }
          EOF

      - name: Build UVieKey (arm64)
        run: swift build --configuration release --arch arm64

      - name: Build UVieKey (x86_64)
        run: swift build --configuration release --arch x86_64
